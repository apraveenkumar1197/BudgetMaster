services:

  # ── MySQL (Laravel users / auth tables) ─────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: budgetmaster_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-budgetmaster}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-budgetmaster}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - budgetmaster
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-secret}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Laravel PHP-FPM ──────────────────────────────────────────────────────────
  laravel-php:
    build:
      context: ./laravel
      dockerfile: Dockerfile
    container_name: budgetmaster_php
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://localhost:8080}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-budgetmaster}
      DB_USERNAME: ${DB_USERNAME:-budgetmaster}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      OAUTH_CLIENT_ID: ${OAUTH_CLIENT_ID}
      OAUTH_CLIENT_SECRET: ${OAUTH_CLIENT_SECRET}
    volumes:
      - laravel_storage:/var/www/storage
      - sqlite_dbs:/var/www/database
    networks:
      - budgetmaster
    depends_on:
      db:
        condition: service_healthy

  # ── Nginx (Laravel API) ──────────────────────────────────────────────────────
  laravel-nginx:
    image: nginx:alpine
    container_name: budgetmaster_api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8080}:80"
    volumes:
      - ./laravel/public:/var/www/public:ro
      - ./docker/nginx/laravel.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - budgetmaster
    depends_on:
      - laravel-php

  # ── React SPA ────────────────────────────────────────────────────────────────
  react-app:
    build:
      context: ./reactjs
      dockerfile: Dockerfile
      args:
        REACT_APP_API_BASE_URL: ${REACT_APP_API_BASE_URL:-http://localhost:8080/api/}
    container_name: budgetmaster_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - budgetmaster

networks:
  budgetmaster:
    driver: bridge

volumes:
  db_data:
  laravel_storage:
  sqlite_dbs:
