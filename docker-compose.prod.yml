# Overlay for production deployment.
# Used together with docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Replaces the local build: contexts with pre-built registry images so the
# server never needs the source code or build tools.

services:

  laravel-php:
    build: !reset null
    image: ${API_IMAGE:-docker.io/yourusername/budgetmaster-api}:${API_IMAGE_TAG:-latest}

  laravel-nginx:
    volumes:
      # In production the public/ dir is served from the named volume
      # populated by the laravel-php container on start-up (see entrypoint).
      - laravel_public:/var/www/public:ro
      - ./docker/nginx/laravel.conf:/etc/nginx/conf.d/default.conf:ro

  react-app:
    build: !reset null
    image: ${FRONTEND_IMAGE:-docker.io/yourusername/budgetmaster-frontend}:${FRONTEND_IMAGE_TAG:-latest}

volumes:
  laravel_public:
